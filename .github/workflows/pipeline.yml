name: CI/CD Pipeline Completo

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────
  # ETAPA 1: SONARQUBE
  # ─────────────────────────────────────
  sonarqube:
    name: Analisis SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Ejecucion SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.qualitygate.wait=false

  # ─────────────────────────────────────
  # ETAPA 2: K6
  # ─────────────────────────────────────
  k6:
    name: Pruebas de Carga K6
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v3

      - name: Instalar dependencias
        run: npm install

      - name: Levantar app
        run: node app.js &

      - name: Esperar que inicie
        run: sleep 5

      - name: Instalar K6
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Correr K6
        run: k6 run tests/load-test.js

  # ─────────────────────────────────────
  # ETAPA 3: DOCKER BUILD + PUSH
  # ─────────────────────────────────────
  docker:
    name: Build y Push Docker
    runs-on: ubuntu-latest
    needs: k6
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────
  # ETAPA 4: DEPLOY EN GCP
  # ─────────────────────────────────────
  deploy:
    name: Deploy en GCP
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ghcr.io/${{ github.repository }}:main
            docker run -d \
              --name my-node-app \
              -p 3000:3000 \
              --restart always \
              ghcr.io/${{ github.repository }}:main